name: publish-catalog-v2

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install catalog tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - uses: sigstore/cosign-installer@v3

      - name: Prepare central catalog
        run: |
          cargo run --locked --manifest-path xtask/Cargo.toml -- \
            catalog prepare-v2 --out dist/catalog-v2

      - name: Sign central catalog assets
        run: |
          set -euo pipefail
          for asset in catalog-v2.json catalog-v2.min.json.zst; do
            cosign sign-blob \
              --yes \
              --bundle "dist/catalog-v2/${asset}.bundle" \
              "dist/catalog-v2/${asset}"
          done

      - name: Publish central catalog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "catalog/v2" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "catalog/v2" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Scryer plugin central catalog v2" \
              --target "${GITHUB_SHA}" \
              --notes "Scryer plugin central catalog assets."
          gh release upload "catalog/v2" \
            "dist/catalog-v2/catalog-v2.json" \
            "dist/catalog-v2/catalog-v2.json.bundle" \
            "dist/catalog-v2/catalog-v2.min.json.zst" \
            "dist/catalog-v2/catalog-v2.min.json.zst.bundle" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
