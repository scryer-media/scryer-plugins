name: release-plugin

on:
  push:
    tags:
      - "plugins/release/*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag or commit to publish"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build-sign-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen zstd

      - uses: sigstore/cosign-installer@v3

      - name: Build xtask once
        run: cargo build --locked --manifest-path xtask/Cargo.toml --bin xtask

      - name: Select plugin tags for this release commit
        run: |
          set -euo pipefail
          RELEASE_SHA="$(git rev-parse HEAD)"
          mapfile -t plugin_tags < <(git tag --points-at "${RELEASE_SHA}" | sort | grep -E '^plugins/[^/]+/v.+$' || true)
          if [ "${#plugin_tags[@]}" -eq 0 ]; then
            echo "No plugin release tags point at ${RELEASE_SHA}" >&2
            exit 1
          fi
          printf '%s\n' "${plugin_tags[@]}" > selected-plugin-tags.txt
          printf 'Selected plugin tags for %s\n' "${RELEASE_SHA}"
          printf ' - %s\n' "${plugin_tags[@]}"

      - name: Prefetch selected plugin dependencies
        run: |
          set -euo pipefail
          mapfile -t plugin_ids < <(
            while IFS= read -r tag; do
              plugin_spec="${tag#plugins/}"
              printf '%s\n' "${plugin_spec%/v*}"
            done < selected-plugin-tags.txt | sort -u
          )
          ./target/debug/xtask official prefetch "${plugin_ids[@]}"

      - name: Prepare sign and publish selected plugin assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            plugin_spec="${tag#plugins/}"
            plugin_id="${plugin_spec%/v*}"
            version="${tag##*/v}"
            prepared_dir="dist/catalog-v2/${plugin_id}"
            existing_dir="existing-child-catalog/${plugin_id}"
            existing_args=()

            mkdir -p "${existing_dir}"
            if gh release download "plugins/${plugin_id}/catalog" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern catalog-v2.min.json.zst \
              --pattern catalog-v2.min.json.zst.bundle \
              --dir "${existing_dir}" \
              --clobber; then
              cosign verify-blob \
                --bundle "${existing_dir}/catalog-v2.min.json.zst.bundle" \
                --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-plugin\\.yml@refs/(tags|heads)/.*$" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "${existing_dir}/catalog-v2.min.json.zst"
              existing_args=(--existing-child-catalog "${existing_dir}/catalog-v2.min.json.zst")
            else
              echo "No existing child catalog found for ${plugin_id}; preparing first catalog."
            fi

            ./target/debug/xtask official prepare "${plugin_id}" \
              --version "${version}" \
              --out "${prepared_dir}" \
              "${existing_args[@]}"

            ./target/debug/xtask official verify-prepared "${prepared_dir}"

            for asset in plugin.wasm.zst plugin.manifest.json catalog-v2.json catalog-v2.min.json.zst; do
              cosign sign-blob \
                --yes \
                --bundle "${prepared_dir}/${asset}.bundle" \
                "${prepared_dir}/${asset}"
            done

            gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
              gh release create "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${plugin_id} ${version}" \
                --target "$(git rev-parse HEAD)" \
                --notes "Scryer plugin distribution assets."
            gh release upload "${tag}" \
              "${prepared_dir}/plugin.wasm.zst" \
              "${prepared_dir}/plugin.wasm.zst.bundle" \
              "${prepared_dir}/plugin.manifest.json" \
              "${prepared_dir}/plugin.manifest.json.bundle" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber

            catalog_tag="plugins/${plugin_id}/catalog"
            gh release view "${catalog_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
              gh release create "${catalog_tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${plugin_id} plugin catalog" \
                --target "$(git rev-parse HEAD)" \
                --notes "Scryer plugin child catalog assets."
            gh release upload "${catalog_tag}" \
              "${prepared_dir}/catalog-v2.json" \
              "${prepared_dir}/catalog-v2.json.bundle" \
              "${prepared_dir}/catalog-v2.min.json.zst" \
              "${prepared_dir}/catalog-v2.min.json.zst.bundle" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          done < selected-plugin-tags.txt

      - name: Prepare sign and publish central catalog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./target/debug/xtask catalog prepare-v2 --out dist/catalog-v2
          for asset in catalog-v2.json catalog-v2.min.json.zst; do
            cosign sign-blob \
              --yes \
              --bundle "dist/catalog-v2/${asset}.bundle" \
              "dist/catalog-v2/${asset}"
          done

          gh release view "catalog/v2" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "catalog/v2" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Scryer plugin central catalog v2" \
              --target "$(git rev-parse HEAD)" \
              --notes "Scryer plugin central catalog assets."
          gh release upload "catalog/v2" \
            "dist/catalog-v2/catalog-v2.json" \
            "dist/catalog-v2/catalog-v2.json.bundle" \
            "dist/catalog-v2/catalog-v2.min.json.zst" \
            "dist/catalog-v2/catalog-v2.min.json.zst.bundle" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
