name: release-plugin

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag or commit to publish"
        required: true
        type: string
      release_commit:
        description: "Commit that owns the plugin version tags to publish"
        required: false
        type: string
      plugin_ids:
        description: "Optional whitespace or comma separated plugin ids to include from the release commit"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  RELEASE_PLUGIN_CACHE_SCOPE: release-plugin
  RELEASE_PLUGIN_PLAN_SCCACHE_LANE: linux-host-xtask
  RELEASE_PLUGIN_BUILD_SCCACHE_LANE: linux-wasm32-wasip1-plugin-release
  SCCACHE_VERSION: v0.10.0
  SCRYER_OFFICIAL_RELEASE_WORKFLOW_PATH: .github/workflows/release-plugin.yml
  SCRYER_PLUGIN_RELEASE_SOURCE_ROOT: ${{ github.workspace }}/release-source

jobs:
  plan-release:
    outputs:
      plugin_matrix: ${{ steps.plugin-plans.outputs.matrix }}
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      GH_TOKEN: ${{ github.token }}
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_CACHE_SIZE: 10G
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_IDLE_TIMEOUT: "0"
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Checkout release source
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_ref }}
          path: release-source

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: gha-rust-cache-linux-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-validate
          cache-targets: "false"
          cache-workspace-crates: "false"
          key: validate

      - name: Restore sccache directory
        id: validate-sccache-restore
        uses: actions/cache/restore@v5.0.5
        with:
          path: /home/runner/.cache/sccache
          key: gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_PLAN_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-plan-release-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_PLAN_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_PLAN_SCCACHE_LANE }}-

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) archive="sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" ;;
            aarch64|arm64) archive="sccache-${SCCACHE_VERSION}-aarch64-unknown-linux-musl.tar.gz" ;;
            *)
              echo "Unsupported architecture for sccache: $(uname -m)" >&2
              exit 1
              ;;
          esac
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/${archive}" -o "${tmpdir}/${archive}"
          tar -xzf "${tmpdir}/${archive}" -C "${tmpdir}"
          install -d "${CARGO_HOME}/bin"
          install -m 0755 "${tmpdir}"/sccache-*/sccache "${CARGO_HOME}/bin/sccache"
          echo "${CARGO_HOME}/bin" >> "$GITHUB_PATH"
          sccache --version

      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true

      - name: Build xtask once
        run: cargo build --locked --profile xtask-release --manifest-path xtask/Cargo.toml --bin xtask

      - name: Select plugin release plan
        run: |
          set -euo pipefail
          RELEASE_SHA="${{ github.event_name == 'workflow_dispatch' && inputs.release_commit || '' }}"
          if [ -z "${RELEASE_SHA}" ]; then
            RELEASE_SHA="$(git -C "${SCRYER_PLUGIN_RELEASE_SOURCE_ROOT}" rev-parse HEAD)"
          fi
          mapfile -t plugin_tags < <(
            git -C "${SCRYER_PLUGIN_RELEASE_SOURCE_ROOT}" tag --points-at "${RELEASE_SHA}" \
              | sort \
              | grep -E '^plugins/[^/]+/v.+$' \
              || true
          )
          PLUGIN_IDS_INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.plugin_ids || '' }}"
          if [ -n "${PLUGIN_IDS_INPUT//[[:space:],]/}" ]; then
            mapfile -t requested_plugin_ids < <(
              printf '%s\n' "${PLUGIN_IDS_INPUT}" \
                | tr ',[:space:]' '\n' \
                | awk 'NF'
            )
            filtered_tags=()
            for tag in "${plugin_tags[@]}"; do
              plugin_spec="${tag#plugins/}"
              plugin_id="${plugin_spec%/v*}"
              for requested_plugin_id in "${requested_plugin_ids[@]}"; do
                if [ "${plugin_id}" = "${requested_plugin_id}" ]; then
                  filtered_tags+=("${tag}")
                  break
                fi
              done
            done
            plugin_tags=("${filtered_tags[@]}")
          fi
          if [ "${#plugin_tags[@]}" -eq 0 ]; then
            echo "No plugin release tags point at ${RELEASE_SHA}" >&2
            exit 1
          fi
          : > release-plan.tsv
          for tag in "${plugin_tags[@]}"; do
            plugin_spec="${tag#plugins/}"
            plugin_id="${plugin_spec%/v*}"
            version="${tag##*/v}"
            printf '%s\t%s\n' "${plugin_id}" "${version}" >> release-plan.tsv
          done
          printf 'Selected plugin release plan for %s\n' "${RELEASE_SHA}"
          while IFS=$'\t' read -r plugin_id version; do
            printf ' - %s %s\n' "${plugin_id}" "${version}"
          done < release-plan.tsv

      - name: Build plugin release matrix
        id: plugin-plans
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          rows = []
          for line in Path("release-plan.tsv").read_text().splitlines():
              plugin_id, version = line.split("\t", 1)
              rows.append({"plugin_id": plugin_id, "version": version})

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps({'include': rows})}\n")
          PY

      - name: Show sccache stats
        if: always()
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats | tee validate-sccache-stats.txt
          else
            echo "sccache unavailable" | tee validate-sccache-stats.txt
          fi

      - name: Upload xtask artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-plugin-xtask-${{ github.run_id }}
          path: xtask/target/xtask-release/xtask
          if-no-files-found: error
          retention-days: 7

      - name: Upload release plan
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-plugin-plan-${{ github.run_id }}
          path: |
            release-plan.tsv
          if-no-files-found: error
          retention-days: 7

      - name: Upload validate stats
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-plugin-validate-${{ github.run_id }}
          path: validate-sccache-stats.txt
          if-no-files-found: error
          retention-days: 7

      - name: Save sccache directory
        if: always()
        uses: actions/cache/save@v5.0.5
        with:
          path: /home/runner/.cache/sccache
          key: ${{ steps.validate-sccache-restore.outputs.cache-primary-key }}

  build-sign-release-plugin:
    needs: [plan-release]
    name: validate-build-sign-release (${{ matrix.plugin_id }} ${{ matrix.version }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-release.outputs.plugin_matrix) }}
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      GH_TOKEN: ${{ github.token }}
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_CACHE_SIZE: 10G
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_IDLE_TIMEOUT: "0"
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Checkout release source
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_ref }}
          path: release-source

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: gha-rust-cache-linux-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-prepare-${{ matrix.plugin_id }}
          cache-targets: "false"
          cache-workspace-crates: "false"
          key: prepare-${{ matrix.plugin_id }}

      - name: Restore sccache directory
        id: prepare-sccache-restore
        uses: actions/cache/restore@v5.0.5
        with:
          path: /home/runner/.cache/sccache
          key: gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_BUILD_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ matrix.plugin_id }}-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_BUILD_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_BUILD_SCCACHE_LANE }}-

      - name: Install release tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y binaryen python3-pip zstd
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@v2.81.11
        with:
          tool: cargo-audit

      - uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.0.2

      - name: Install sccache
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) archive="sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" ;;
            aarch64|arm64) archive="sccache-${SCCACHE_VERSION}-aarch64-unknown-linux-musl.tar.gz" ;;
            *)
              echo "Unsupported architecture for sccache: $(uname -m)" >&2
              exit 1
              ;;
          esac
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/${archive}" -o "${tmpdir}/${archive}"
          tar -xzf "${tmpdir}/${archive}" -C "${tmpdir}"
          install -d "${CARGO_HOME}/bin"
          install -m 0755 "${tmpdir}"/sccache-*/sccache "${CARGO_HOME}/bin/sccache"
          echo "${CARGO_HOME}/bin" >> "$GITHUB_PATH"
          sccache --version

      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true

      - name: Download xtask artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-plugin-xtask-${{ github.run_id }}
          path: xtask-artifact

      - name: Restore xtask binary
        run: |
          set -euo pipefail
          install -d xtask/target/xtask-release
          install -m 0755 xtask-artifact/xtask xtask/target/xtask-release/xtask

      - name: Verify release toolchain and Wasm tooling
        run: ./xtask/target/xtask-release/xtask doctor

      - name: Validate plugin formatting audit and clippy
        run: |
          set -euo pipefail
          ./xtask/target/xtask-release/xtask ci strict --plugin-id "${{ matrix.plugin_id }}"

      - name: Restore single-plugin release plan
        run: |
          set -euo pipefail
          printf '%s\t%s\n' "${{ matrix.plugin_id }}" "${{ matrix.version }}" > release-plan.tsv

      - name: Prefetch selected plugin dependencies
        run: |
          set -euo pipefail
          mapfile -t plugin_ids < <(cut -f1 release-plan.tsv | sort -u)
          ./xtask/target/xtask-release/xtask official prefetch "${plugin_ids[@]}"

      - name: Prepare sign and publish selected plugin assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          while IFS=$'\t' read -r plugin_id version; do
            tag="plugins/${plugin_id}/v${version}"
            prepared_dir="dist/catalog-v2/${plugin_id}"
            existing_dir="existing-child-catalog/${plugin_id}"
            existing_args=()
            previous_tag="$(
              git -C "${SCRYER_PLUGIN_RELEASE_SOURCE_ROOT}" tag --list "plugins/${plugin_id}/v*" --sort=-version:refname \
                | grep -v -Fx "${tag}" \
                | head -n1 \
                || true
            )"

            mkdir -p "${existing_dir}"
            if [ -n "${previous_tag}" ] && gh release download "${previous_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern catalog-v2.min.json.zst \
              --pattern catalog-v2.min.json.zst.bundle \
              --dir "${existing_dir}" \
              --clobber; then
              cosign verify-blob \
                --bundle "${existing_dir}/catalog-v2.min.json.zst.bundle" \
                --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-plugin\\.yml@refs/(tags|heads)/.*$" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "${existing_dir}/catalog-v2.min.json.zst"
              existing_args=(--existing-child-catalog "${existing_dir}/catalog-v2.min.json.zst")
            else
              echo "No existing child catalog found for ${plugin_id}; preparing first catalog."
            fi

            catalog_version_args=()
            if ./xtask/target/xtask-release/xtask official prepare --help | grep -q -- '--catalog-version'; then
              catalog_version_args=(--catalog-version v2)
            fi

            ./xtask/target/xtask-release/xtask official prepare "${plugin_id}" \
              --version "${version}" \
              --out "${prepared_dir}" \
              "${catalog_version_args[@]}" \
              "${existing_args[@]}"

            ./xtask/target/xtask-release/xtask official verify-prepared "${prepared_dir}"

            cosign sign-blob \
              --yes \
              --bundle "${prepared_dir}/plugin.wasm.zst.bundle" \
              "${prepared_dir}/plugin.wasm.zst"

            release_assets=("${prepared_dir}/plugin.wasm.zst" "${prepared_dir}/plugin.wasm.zst.bundle")
            for asset in plugin.manifest.json catalog-v2.json catalog-v2.min.json.zst; do
              if [ -f "${prepared_dir}/${asset}" ]; then
                cosign sign-blob \
                  --yes \
                  --bundle "${prepared_dir}/${asset}.bundle" \
                  "${prepared_dir}/${asset}"
                release_assets+=("${prepared_dir}/${asset}" "${prepared_dir}/${asset}.bundle")
              fi
            done

            gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
              gh release create "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${plugin_id} ${version}" \
                --target "$(git -C "${SCRYER_PLUGIN_RELEASE_SOURCE_ROOT}" rev-parse HEAD)" \
                --notes "Scryer plugin distribution assets."
            gh release upload "${tag}" \
              "${release_assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          done < release-plan.tsv

      - name: Stage prepared child catalogs
        run: |
          set -euo pipefail
          rm -rf prepared-child-catalogs
          mkdir -p prepared-child-catalogs
          cp -R "dist/catalog-v2/${{ matrix.plugin_id }}" "prepared-child-catalogs/${{ matrix.plugin_id }}"

      - name: Show sccache stats
        if: always()
        run: |
          set -euo pipefail
          sccache --show-stats | tee prepare-sccache-stats.txt

      - name: Upload prepared child catalogs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-plugin-child-catalogs-${{ github.run_id }}-${{ matrix.plugin_id }}
          path: prepared-child-catalogs
          if-no-files-found: error
          retention-days: 7

      - name: Upload release stats
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-plugin-artifacts-${{ github.run_id }}-${{ matrix.plugin_id }}
          path: prepare-sccache-stats.txt
          if-no-files-found: error
          retention-days: 7

      - name: Save sccache directory
        if: always()
        uses: actions/cache/save@v5.0.5
        with:
          path: /home/runner/.cache/sccache
          key: ${{ steps.prepare-sccache-restore.outputs.cache-primary-key }}

  publish-central-catalog:
    needs: [plan-release, build-sign-release-plugin]
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Checkout release source
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_ref }}
          path: release-source

      - uses: dtolnay/rust-toolchain@stable

      - uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.0.2

      - name: Install central publish tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-pip zstd
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download xtask artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-plugin-xtask-${{ github.run_id }}
          path: xtask-artifact

      - name: Download release plan artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-plugin-plan-${{ github.run_id }}
          path: release-plan-artifact

      - name: Download prepared child catalogs
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-plugin-child-catalogs-${{ github.run_id }}-*
          path: prepared-child-catalogs
          merge-multiple: true

      - name: Restore xtask binary
        run: |
          set -euo pipefail
          install -d xtask/target/xtask-release
          install -m 0755 xtask-artifact/xtask xtask/target/xtask-release/xtask

      - name: Restore full release plan
        run: |
          set -euo pipefail
          install -m 0644 release-plan-artifact/release-plan.tsv release-plan.tsv
          if [ ! -s release-plan.tsv ]; then
            echo "Release plan is empty" >&2
            exit 1
          fi

      - name: Verify prepared child catalogs
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r plugin_id _; do
            ./xtask/target/xtask-release/xtask official verify-prepared "prepared-child-catalogs/${plugin_id}"
          done < release-plan.tsv

      - name: Prefetch catalog plugin dependencies
        run: |
          set -euo pipefail
          mapfile -t plugin_ids < <(cut -f1 release-plan.tsv | sort -u)
          ./xtask/target/xtask-release/xtask official prefetch "${plugin_ids[@]}"

      - name: Prepare sign and publish central catalog
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t plugin_ids < <(cut -f1 release-plan.tsv | sort -u)
          prepare_v2_args=(
            --out dist/catalog-v2
            --prepared-child-catalog-root prepared-child-catalogs
          )
          for plugin_id in "${plugin_ids[@]}"; do
            prepare_v2_args+=(--plugin-id "${plugin_id}")
          done
          ./xtask/target/xtask-release/xtask catalog prepare-v2 "${prepare_v2_args[@]}"
          for asset in catalog-v2.json catalog-v2.min.json.zst; do
            cosign sign-blob \
              --yes \
              --bundle "dist/catalog-v2/${asset}.bundle" \
              "dist/catalog-v2/${asset}"
          done

          if ! gh release view "catalog/v2" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if git ls-remote --exit-code --tags origin "catalog/v2" >/dev/null 2>&1; then
              gh release create "catalog/v2" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "Scryer plugin central catalog v2" \
                --notes "Scryer plugin central catalog assets."
            else
              gh release create "catalog/v2" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "Scryer plugin central catalog v2" \
                --target "$(git -C "${SCRYER_PLUGIN_RELEASE_SOURCE_ROOT}" rev-parse HEAD)" \
                --notes "Scryer plugin central catalog assets."
            fi
          fi
          gh release upload "catalog/v2" \
            "dist/catalog-v2/catalog-v2.json" \
            "dist/catalog-v2/catalog-v2.json.bundle" \
            "dist/catalog-v2/catalog-v2.min.json.zst" \
            "dist/catalog-v2/catalog-v2.min.json.zst.bundle" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
