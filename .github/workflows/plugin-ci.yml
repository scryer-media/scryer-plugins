name: plugin-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo run --locked --manifest-path xtask/Cargo.toml -- ci fmt

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Run strict clippy
        run: cargo run --locked --manifest-path xtask/Cargo.toml -- ci clippy

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - uses: taiki-e/install-action@v2.81.11
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo run --locked --manifest-path xtask/Cargo.toml -- ci audit

  wasm-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Validate official plugins through the release Wasm path
        run: cargo run --locked --manifest-path xtask/Cargo.toml -- plugin validate-all
