name: release-plugin-v3-stage

on:
  push:
    tags:
      - "plugins-stage/release/*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag or commit to publish"
        required: true
        type: string
      release_commit:
        description: "Commit that owns the plugin version tags to publish"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  RELEASE_PLUGIN_CACHE_SCOPE: release-plugin-v3-stage
  RELEASE_PLUGIN_PLAN_SCCACHE_LANE: linux-host-xtask
  RELEASE_PLUGIN_BUILD_SCCACHE_LANE: linux-wasm32-wasip1-plugin-release
  CF_JURISDICTION_URL: ${{ secrets.CF_JURISDICTION_URL }}
  SCRYER_OFFICIAL_RELEASE_WORKFLOW_PATH: .github/workflows/release-plugin-v3-stage.yml
  SCRYER_OFFICIAL_PLUGIN_RELEASE_TAG_PREFIX: plugins-stage
  SCRYER_CATALOG_V3_RELEASE_TAG: catalog/v3-stage
  SCRYER_CATALOG_V3_PATH_PREFIX: catalog/v3-stage

jobs:
  plan-release:
    outputs:
      plugin_matrix: ${{ steps.plugin-plans.outputs.matrix }}
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_R2_BUCKET_ID: ${{ vars.CF_R2_BUCKET_ID }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      GH_TOKEN: ${{ github.token }}
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_CACHE_SIZE: 10G
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_IDLE_TIMEOUT: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gha-rust-cache-linux-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-validate
          workspaces: |
            xtask -> target
          cache-targets: "false"
          cache-workspace-crates: "false"
          key: validate

      - name: Restore sccache directory
        id: validate-sccache-restore
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/.cache/sccache
          key: gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_PLAN_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-plan-release-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_PLAN_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_PLAN_SCCACHE_LANE }}-

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true

      - name: Build xtask once
        run: cargo build --locked --profile xtask-release --manifest-path xtask/Cargo.toml --bin xtask

      - name: Select plugin release plan
        run: |
          set -euo pipefail
          RELEASE_SHA="${{ github.event_name == 'workflow_dispatch' && inputs.release_commit || '' }}"
          if [ -z "${RELEASE_SHA}" ]; then
            RELEASE_SHA="$(git rev-parse HEAD)"
          fi
          mapfile -t plugin_tags < <(
            git tag --points-at "${RELEASE_SHA}" \
              | sort \
              | grep -E '^plugins-stage/[^/]+/v.+$' \
              || true
          )
          if [ "${#plugin_tags[@]}" -eq 0 ]; then
            echo "No plugin release tags point at ${RELEASE_SHA}" >&2
            exit 1
          fi
          : > release-plan.tsv
          for tag in "${plugin_tags[@]}"; do
            plugin_spec="${tag#plugins-stage/}"
            plugin_id="${plugin_spec%/v*}"
            version="${tag##*/v}"
            printf '%s\t%s\n' "${plugin_id}" "${version}" >> release-plan.tsv
          done
          printf 'Selected plugin release plan for %s\n' "${RELEASE_SHA}"
          while IFS=$'\t' read -r plugin_id version; do
            printf ' - %s %s\n' "${plugin_id}" "${version}"
          done < release-plan.tsv

      - name: Build plugin release matrix
        id: plugin-plans
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          rows = []
          for line in Path("release-plan.tsv").read_text().splitlines():
              plugin_id, version = line.split("\t", 1)
              rows.append({"plugin_id": plugin_id, "version": version})

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps({'include': rows})}\n")
          PY

      - name: Show sccache stats
        if: always()
        run: |
          set -euo pipefail
          sccache --show-stats | tee validate-sccache-stats.txt

      - name: Upload xtask artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-plugin-v3-stage-xtask-${{ github.run_id }}
          path: xtask/target/xtask-release/xtask
          if-no-files-found: error
          retention-days: 7

      - name: Upload release plan
        uses: actions/upload-artifact@v7
        with:
          name: release-plugin-v3-stage-plan-${{ github.run_id }}
          path: |
            release-plan.tsv
          if-no-files-found: error
          retention-days: 7

      - name: Upload validate stats
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-plugin-v3-stage-validate-${{ github.run_id }}
          path: validate-sccache-stats.txt
          if-no-files-found: error
          retention-days: 7

      - name: Save sccache directory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /home/runner/.cache/sccache
          key: ${{ steps.validate-sccache-restore.outputs.cache-primary-key }}

  build-sign-release-plugin:
    needs: [plan-release]
    name: validate-build-sign-release (${{ matrix.plugin_id }} ${{ matrix.version }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-release.outputs.plugin_matrix) }}
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_R2_BUCKET_ID: ${{ vars.CF_R2_BUCKET_ID }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      GH_TOKEN: ${{ github.token }}
      RUSTC_WRAPPER: sccache
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      SCCACHE_CACHE_SIZE: 10G
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_IDLE_TIMEOUT: "0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gha-rust-cache-linux-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-prepare-${{ matrix.plugin_id }}
          workspaces: |
            xtask -> target
            download_clients/qbittorrent -> target
            indexers/dognzb -> target
            indexers/newznab -> target
            indexers/nzbgeek -> target
            indexers/torrent-rss -> target
            indexers/torznab -> target
            notifications/email -> target
            notifications/jellyfin -> target
            notifications/webhook -> target
            subtitles/jimaku -> target
            subtitles/opensubtitles -> target
            subtitles/subdl -> target
          cache-targets: "false"
          cache-workspace-crates: "false"
          key: prepare-${{ matrix.plugin_id }}

      - name: Restore sccache directory
        id: prepare-sccache-restore
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/.cache/sccache
          key: gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_BUILD_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-${{ matrix.plugin_id }}-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_BUILD_SCCACHE_LANE }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            gha-sccache-v1-${{ env.RELEASE_PLUGIN_CACHE_SCOPE }}-${{ env.RELEASE_PLUGIN_BUILD_SCCACHE_LANE }}-

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen python3-pip zstd
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v3.0.2

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true

      - name: Download xtask artifact
        uses: actions/download-artifact@v8
        with:
          name: release-plugin-v3-stage-xtask-${{ github.run_id }}
          path: xtask-artifact

      - name: Restore xtask binary
        run: |
          set -euo pipefail
          install -d xtask/target/xtask-release
          install -m 0755 xtask-artifact/xtask xtask/target/xtask-release/xtask

      - name: Verify release toolchain and Wasm tooling
        run: ./xtask/target/xtask-release/xtask doctor

      - name: Validate plugin formatting audit and clippy
        run: |
          set -euo pipefail
          ./xtask/target/xtask-release/xtask ci strict --plugin-id "${{ matrix.plugin_id }}"

      - name: Restore single-plugin release plan
        run: |
          set -euo pipefail
          printf '%s\t%s\n' "${{ matrix.plugin_id }}" "${{ matrix.version }}" > release-plan.tsv

      - name: Prefetch selected plugin dependencies
        run: |
          set -euo pipefail
          mapfile -t plugin_ids < <(cut -f1 release-plan.tsv | sort -u)
          ./xtask/target/xtask-release/xtask official prefetch "${plugin_ids[@]}"

      - name: Prepare sign and publish selected plugin v3 stage assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          while IFS=$'\t' read -r plugin_id version; do
            tag="plugins-stage/${plugin_id}/v${version}"
            prepared_dir="dist/stage-prepared/${plugin_id}"

            ./xtask/target/xtask-release/xtask official prepare "${plugin_id}" \
              --version "${version}" \
              --out "${prepared_dir}"

            ./xtask/target/xtask-release/xtask official verify-prepared "${prepared_dir}"

            python3 -c 'import json, sys; from pathlib import Path; prepared_dir = Path(sys.argv[1]); snippet = json.loads((prepared_dir / "catalog-v3.json").read_text()); print("\n".join(sorted({artifact["url"].rsplit("/", 1)[-1] for release in snippet["releases"] for artifact in release["artifacts"]})))' "${prepared_dir}" > "${prepared_dir}/v3-artifacts.txt"

            while IFS= read -r artifact_name; do
              [ -n "${artifact_name}" ] || continue
              cosign sign-blob \
                --yes \
                --bundle "${prepared_dir}/${artifact_name}.bundle" \
                "${prepared_dir}/${artifact_name}"
              zstd -19 -f "${prepared_dir}/${artifact_name}.bundle" -o "${prepared_dir}/${artifact_name}.bundle.zst"
              rm -f "${prepared_dir}/${artifact_name}.bundle"
            done < "${prepared_dir}/v3-artifacts.txt"

            release_assets=()
            for asset in catalog-v3.json; do
              if [ -f "${prepared_dir}/${asset}" ]; then
                cosign sign-blob \
                  --yes \
                  --bundle "${prepared_dir}/${asset}.bundle" \
                  "${prepared_dir}/${asset}"
                release_assets+=("${prepared_dir}/${asset}" "${prepared_dir}/${asset}.bundle")
              fi
            done

            while IFS= read -r artifact_name; do
              [ -n "${artifact_name}" ] || continue
              release_assets+=(
                "${prepared_dir}/${artifact_name}"
                "${prepared_dir}/${artifact_name}.bundle.zst"
              )
            done < "${prepared_dir}/v3-artifacts.txt"

            ./xtask/target/xtask-release/xtask official upload-r2 "${prepared_dir}"

            gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
              gh release create "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${plugin_id} ${version} (stage)" \
                --target "$(git rev-parse HEAD)" \
                --notes "Scryer plugin distribution assets for the catalog-v3 staging lane."
            gh release upload "${tag}" \
              "${release_assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          done < release-plan.tsv

      - name: Stage prepared plugin artifacts
        run: |
          set -euo pipefail
          rm -rf prepared-plugins
          mkdir -p prepared-plugins
          cp -R "dist/stage-prepared/${{ matrix.plugin_id }}" "prepared-plugins/${{ matrix.plugin_id }}"

      - name: Show sccache stats
        if: always()
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats | tee prepare-sccache-stats.txt
          else
            echo "sccache unavailable" | tee prepare-sccache-stats.txt
          fi

      - name: Upload prepared plugin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-plugin-v3-stage-prepared-${{ github.run_id }}-${{ matrix.plugin_id }}
          path: prepared-plugins
          if-no-files-found: error
          retention-days: 7

      - name: Upload release stats
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-plugin-v3-stage-artifacts-${{ github.run_id }}-${{ matrix.plugin_id }}
          path: prepare-sccache-stats.txt
          if-no-files-found: error
          retention-days: 7

      - name: Save sccache directory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /home/runner/.cache/sccache
          key: ${{ steps.prepare-sccache-restore.outputs.cache-primary-key }}

  publish-central-catalog:
    needs: [plan-release, build-sign-release-plugin]
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_R2_BUCKET_ID: ${{ vars.CF_R2_BUCKET_ID }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v3.0.2

      - name: Install central publish tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zstd
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download xtask artifact
        uses: actions/download-artifact@v8
        with:
          name: release-plugin-v3-stage-xtask-${{ github.run_id }}
          path: xtask-artifact

      - name: Download release plan artifact
        uses: actions/download-artifact@v8
        with:
          name: release-plugin-v3-stage-plan-${{ github.run_id }}
          path: release-plan-artifact

      - name: Download prepared plugin artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-plugin-v3-stage-prepared-${{ github.run_id }}-*
          path: prepared-plugins
          merge-multiple: true

      - name: Restore xtask binary
        run: |
          set -euo pipefail
          install -d xtask/target/xtask-release
          install -m 0755 xtask-artifact/xtask xtask/target/xtask-release/xtask

      - name: Restore full release plan
        run: |
          set -euo pipefail
          install -m 0644 release-plan-artifact/release-plan.tsv release-plan.tsv
          if [ ! -s release-plan.tsv ]; then
            echo "Release plan is empty" >&2
            exit 1
          fi

      - name: Verify prepared plugin artifacts
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r plugin_id _; do
            ./xtask/target/xtask-release/xtask official verify-prepared "prepared-plugins/${plugin_id}"
          done < release-plan.tsv

      - name: Prepare sign and publish central catalog v3 stage
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t plugin_ids < <(cut -f1 release-plan.tsv | sort -u)
          prepare_v3_args=(
            --out dist/catalog-v3-stage
            --prepared-plugin-root prepared-plugins
          )
          for plugin_id in "${plugin_ids[@]}"; do
            prepare_v3_args+=(--plugin-id "${plugin_id}")
          done
          ./xtask/target/xtask-release/xtask catalog prepare-v3 "${prepare_v3_args[@]}"
          for asset in catalog-v3.min.json.zst; do
            cosign sign-blob \
              --yes \
              --bundle "dist/catalog-v3-stage/${asset}.bundle" \
              "dist/catalog-v3-stage/${asset}"
          done

          python3 -c 'import json; from pathlib import Path; root = Path("dist/catalog-v3-stage"); redirect = json.loads((root / "catalog-v3.redirect.json").read_text()); catalog_assets = [artifact["url"].rsplit("/", 1)[-1] for artifact in redirect["artifacts"]]; catalog = json.loads((root / "catalog-v3.json").read_text()); rule_pack_assets = sorted({artifact["url"].rsplit("/", 1)[-1] for rule_pack in catalog["rule_packs"] for release in rule_pack["releases"] for artifact in release["artifacts"]}); print("\n".join(catalog_assets + rule_pack_assets))' > dist/catalog-v3-stage/v3-central-assets.txt

          while IFS= read -r asset_name; do
            [ -n "${asset_name}" ] || continue
            cosign sign-blob \
              --yes \
              --bundle "dist/catalog-v3-stage/${asset_name}.bundle" \
              "dist/catalog-v3-stage/${asset_name}"
            zstd -19 -f "dist/catalog-v3-stage/${asset_name}.bundle" -o "dist/catalog-v3-stage/${asset_name}.bundle.zst"
            rm -f "dist/catalog-v3-stage/${asset_name}.bundle"
          done < dist/catalog-v3-stage/v3-central-assets.txt

          ./xtask/target/xtask-release/xtask catalog upload-v3-r2 dist/catalog-v3-stage

          gh release view "catalog/v3-stage" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "catalog/v3-stage" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Scryer plugin central catalog v3 stage" \
              --target "$(git rev-parse HEAD)" \
              --notes "Scryer plugin central catalog v3 staging assets."
          central_release_assets=(
            "dist/catalog-v3-stage/catalog-v3.redirect.json"
          )
          while IFS= read -r asset_name; do
            [ -n "${asset_name}" ] || continue
            central_release_assets+=(
              "dist/catalog-v3-stage/${asset_name}"
              "dist/catalog-v3-stage/${asset_name}.bundle.zst"
            )
          done < dist/catalog-v3-stage/v3-central-assets.txt
          gh release upload "catalog/v3-stage" \
            "${central_release_assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
