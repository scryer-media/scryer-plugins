[package]
name = "mailgun-notification"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Mailgun notification plugin"

[package.metadata.scryer]
official = true
plugin_id = "mailgun"
status = "beta"
catalog_versions = ["v3"]
min_scryer_version = "0.16.0"
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/mailgun"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/mailgun"
distribution_base_url = "https://cdn.scryer.media/scryer/plugins/mailgun"

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
notify-common = { path = "../notify-common" }
serde_json = "1"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
