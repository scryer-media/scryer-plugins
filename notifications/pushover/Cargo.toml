[package]
name = "pushover-notification"
version = "0.1.2"
edition = "2024"
license = "GPL-3.0-only"
description = "Pushover notification plugin"

[package.metadata.scryer]
official = true
plugin_id = "pushover"
status = "beta"
catalog_versions = ["v3"]
min_scryer_version = "0.17.0"
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/pushover"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/pushover"

[lib]
crate-type = ["cdylib"]

[dependencies]
aes = "0.8"
base64 = "0.22"
cbc = { version = "0.1", features = ["alloc"] }
extism-pdk = "1.4"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
getrandom = "0.2"
hmac = "0.12"
notify-common = { path = "../notify-common" }
serde_json = "1"
sha2 = "0.10"
scryer-plugin-sdk = "3.2.0"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
