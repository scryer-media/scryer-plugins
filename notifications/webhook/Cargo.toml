[package]
name = "webhook-notification"
version = "0.1.8"
edition = "2021"
license = "GPL-3.0-only"
description = "Generic webhook notification plugin — POSTs JSON payloads to a configured URL"

[package.metadata.scryer]
official = true
plugin_id = "webhook"

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
scryer-plugin-sdk = "1.6.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
