[package]
name = "jellyfin-notification"
version = "0.1.13"
edition = "2024"
license = "GPL-3.0-only"
description = "Targeted Jellyfin library refresh notifications using mapped media paths and provider-id fallbacks"

[package.metadata.scryer]
official = true
plugin_id = "jellyfin"
catalog_versions = ["v3"]
min_scryer_version = "0.17.0"
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/jellyfin"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/jellyfin"

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
scryer-plugin-sdk = "3.2.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
