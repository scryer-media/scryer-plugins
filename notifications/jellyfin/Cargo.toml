[package]
name = "jellyfin-notification"
version = "0.1.5"
edition = "2021"
license = "GPL-3.0-only"
description = "Targeted Jellyfin library refresh notifications using mapped media paths and provider-id fallbacks"

[package.metadata.scryer]
official = true
plugin_id = "jellyfin"

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
scryer-plugin-sdk = "1.5.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
