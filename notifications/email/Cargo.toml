[package]
name = "email-notification"
version = "0.1.7"
edition = "2024"
license = "GPL-3.0-only"
description = "Plaintext SMTP email notification plugin with plain, STARTTLS, and TLS delivery modes"

[package.metadata.scryer]
official = true
plugin_id = "email"
catalog_versions = ["v3"]
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/email"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/email"
distribution_base_url = "https://cdn.scryer.media/plugins/email"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
futures = "0.3"
scryer-plugin-sdk = "2.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-smtp = { version = "0.9", default-features = false }

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
