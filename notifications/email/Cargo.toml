[package]
name = "email-notification"
version = "0.1.1"
edition = "2021"
license = "GPL-3.0-only"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
futures = "0.3"
scryer-plugin-sdk = { git = "https://github.com/scryer-media/scryer.git", tag = "plugin-sdk-v1.5.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-smtp = { version = "0.9", default-features = false }
