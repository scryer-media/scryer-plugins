[package]
name = "email-notification"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
futures = "0.3"
scryer-plugin-sdk = { path = "../../../scryer/crates/scryer-plugin-sdk" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-smtp = { version = "0.9", default-features = false }
