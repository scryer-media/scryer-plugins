[package]
name = "simplepush-notification"
version = "0.1.1"
edition = "2024"
license = "GPL-3.0-only"
description = "Simplepush notification plugin"

[package.metadata.scryer]
official = true
plugin_id = "simplepush"
status = "beta"
catalog_versions = ["v3"]
min_scryer_version = "0.17.0"
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/simplepush"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/notifications/simplepush"

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
notify-common = { path = "../notify-common" }
serde_json = "1"
scryer-plugin-sdk = "3.2.0"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
