[package]
name = "remux-streaming-copy-transcoder"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Experimental unpublished media transcoder plugin for REMUX-to-streaming-copy workflows"

[package.metadata.scryer]
# Intentionally not official/published; this future transcoder depends on SDK/runtime hooks that do not exist yet.
official = false
plugin_id = "remux-streaming-copy"
status = "experimental"
catalog_versions = ["v3"]
feature_sets = [
  { required_features = [] },
  { required_features = ["simd128", "relaxed-simd"] },
  { required_features = ["simd128", "relaxed-simd", "exception-handling"] },
]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/transcoders/remux-streaming-copy"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/transcoders/remux-streaming-copy"

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
scryer-plugin-sdk = "3.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
