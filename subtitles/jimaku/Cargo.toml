[package]
name = "jimaku-subtitle-provider"
version = "0.1.7"
edition = "2021"
license = "GPL-3.0-only"
description = "Anime-focused Jimaku subtitle provider using AniList IDs and optional name fallback"

[package.metadata.scryer]
official = true
plugin_id = "jimaku"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
scryer-plugin-sdk = "1.6.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
