[package]
name = "jimaku-subtitle-provider"
version = "0.1.10"
edition = "2024"
license = "GPL-3.0-only"
description = "Anime-focused Jimaku subtitle provider using AniList IDs and optional name fallback"

[package.metadata.scryer]
official = true
plugin_id = "jimaku"
catalog_versions = ["v3"]
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/subtitles/jimaku"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/subtitles/jimaku"
distribution_base_url = "https://cdn.scryer.media/scryer/plugins/jimaku"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
scryer-plugin-sdk = "2.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
