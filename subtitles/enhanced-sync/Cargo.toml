[package]
name = "enhanced-subtitle-sync-plugin"
version = "0.2.7"
edition = "2024"
autolib = false
license = "GPL-3.0-only"
description = "Optional enhanced subtitle sync decoder and audio-transcode plugin with FFmpeg-derived audio codec support"

[package.metadata.scryer]
official = true
plugin_id = "enhanced-subtitle-sync"
catalog_versions = ["v3"]
min_scryer_version = "0.17.0"
feature_sets = [{ required_features = [], wasm_opt = "speed" }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/subtitles/enhanced-sync"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/subtitles/enhanced-sync"

[[bin]]
name = "enhanced_subtitle_sync_plugin"
path = "src/lib.rs"

[dependencies]
base64 = "0.22"
scryer-plugin-pdk = { path = "../../pdk/scryer-plugin-pdk" }
scryer-plugin-sdk = "3.6.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rustfft = "6"
encoding_rs = "0.8"
chardetng = "0.1"
symphonia = { version = "0.6.0", default-features = false, features = ["aac", "flac", "mp3", "vorbis", "pcm", "mkv", "isomp4", "wav"] }

[build-dependencies]
cc = "1"
tar = "0.4"
zstd = "0.13"

[dev-dependencies]
tempfile = "3"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
