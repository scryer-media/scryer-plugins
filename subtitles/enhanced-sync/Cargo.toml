[package]
name = "enhanced-subtitle-sync-plugin"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Experimental enhanced subtitle sync decoder plugin with FFmpeg-derived audio codec support"

[package.metadata.scryer]
official = false
plugin_id = "enhanced-subtitle-sync"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
scryer-plugin-sdk = "1.6.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
cc = "1"
tar = "0.4"
zstd = "0.13"

[dev-dependencies]
symphonia = { version = "0.6.0", default-features = false, features = ["flac"] }
tempfile = "3"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
