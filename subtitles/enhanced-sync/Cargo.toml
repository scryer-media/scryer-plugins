[package]
name = "enhanced-subtitle-sync-plugin"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Optional enhanced subtitle sync decoder and audio-transcode plugin with FFmpeg-derived audio codec support"

[package.metadata.scryer]
official = true
plugin_id = "enhanced-subtitle-sync"
status = "beta"
catalog_versions = ["v3"]
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]
docs_url = "https://github.com/scryer-media/scryer-plugins/tree/main/subtitles/enhanced-sync"
source_repo = "https://github.com/scryer-media/scryer-plugins/tree/main/subtitles/enhanced-sync"
distribution_base_url = "https://cdn.scryer.media/plugins/enhanced-subtitle-sync"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
scryer-plugin-sdk = "2.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
alass-core = "2.0.0"
symphonia = { version = "0.6.0", default-features = false, features = ["aac", "flac", "mp3", "vorbis", "pcm", "mkv", "isomp4"] }

[build-dependencies]
cc = "1"
tar = "0.4"
zstd = "0.13"

[dev-dependencies]
tempfile = "3"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
