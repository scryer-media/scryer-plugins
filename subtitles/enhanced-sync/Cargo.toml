[package]
name = "enhanced-subtitle-sync-plugin"
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Experimental enhanced subtitle sync decoder plugin with FFmpeg-derived audio codec support"

[package.metadata.scryer]
official = false
plugin_id = "enhanced-subtitle-sync"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
oxideav-ac3 = "0.0.6"
oxideav-core = "0.1.26"
scryer-plugin-sdk = "1.6.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
truehd = "0.4.0"

[dev-dependencies]
symphonia = { version = "0.6.0", default-features = false }

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
