[package]
name = "opensubtitles-subtitle-provider"
version = "0.1.5"
edition = "2021"
license = "GPL-3.0-only"
description = "OpenSubtitles subtitle provider with provider-managed auth, search, and download"

[package.metadata.scryer]
official = true
plugin_id = "opensubtitles"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
scryer-plugin-sdk = "1.5.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
