[package]
name = "subdl-subtitle-provider"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"
description = "Subdl subtitle provider with API-key search and zip downloads"

[package.metadata.scryer]
official = true
plugin_id = "subdl"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
scryer-plugin-sdk = "1.6.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
