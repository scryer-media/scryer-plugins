[package]
name = "whisper-subtitle-provider"
version = "0.1.3"
edition = "2024"
license = "GPL-3.0-only"
description = "Whisper subtitle provider with locally generated subtitle output"

[package.metadata.scryer]
official = false
feature_sets = [{ required_features = [] }, { required_features = ["simd128", "relaxed-simd"] }]

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
extism-pdk = "1.4"
scryer-plugin-sdk = "3.0.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.plugin-release]
inherits = "release"
opt-level = 3
lto = "fat"
strip = true
panic = "abort"
