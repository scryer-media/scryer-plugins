[package]
name = "scryer-plugin-pdk"
version = "0.2.0"
edition = "2024"
license = "GPL-3.0-only"
description = "Guest runtime bindings for Scryer command-model WebAssembly plugins."
repository = "https://github.com/scryer-media/scryer-plugins"
readme = "README.md"
keywords = ["scryer", "plugin", "wasm", "wasip1"]
categories = ["wasm"]

[dependencies]
scryer-plugin-sdk = { path = "../../../scryer/crates/scryer-plugin-sdk", version = "3.5" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
